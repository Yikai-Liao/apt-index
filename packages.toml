suite = "stable"
component = "main"
required_architectures = ["amd64"]
optional_architectures = []

[repository]
origin = "Apt Index"
label = "lyk-ai personal apt index"
description = "Personal APT index for selected upstream Debian packages"
base_url = "https://deb.lyk-ai.com"

[signing]
key_name = "Apt Index <apt-index@lyk-ai.com>"

[packages.dust]
update_policy = "track"
source = "github"
repo = "bootandy/dust"
asset_patterns.amd64 = "du-dust_*_amd64.deb"

[packages.feishu]
update_policy = "track"
source = "aur"
aur_package = "feishu-bin"
aur_architectures.amd64 = "x86_64"

[packages.lsd]
update_policy = "fixed"
source = "github"
repo = "lsd-rs/lsd"
release_tag = "v1.2.0"
asset_patterns.amd64 = "lsd_1.2.0_amd64.deb"

