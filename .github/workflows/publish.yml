name: Publish APT index

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

concurrency:
  group: apt-index-publish
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ github.event_name != 'push' || github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Restore lockfile from state branch
        run: |
          git fetch origin apt-index-state || true
          if git show-ref --verify --quiet refs/remotes/origin/apt-index-state; then
            git show origin/apt-index-state:apt-index.lock.json > apt-index.lock.json
          fi

      - name: Refresh lockfile and health reports
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: uv run apt-index refresh --jobs 4

      - name: Build deployable tree
        env:
          APT_INDEX_GPG_PRIVATE_KEY_B64: ${{ secrets.APT_INDEX_GPG_PRIVATE_KEY_B64 }}
          APT_INDEX_GPG_PASSPHRASE: ${{ secrets.APT_INDEX_GPG_PASSPHRASE }}
        run: uv run apt-index build

      - name: Plan redirect cache purge
        run: uv run apt-index plan-redirect-purge --output redirect-purge-urls.txt

      - name: Export download stats
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: uv run apt-index download-stats --output dist/download_stats.json

      - name: Render site data
        run: uv run apt-index site-data --output dist/site-data.json --download-stats dist/download_stats.json

      - name: Publish to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist --project-name apt-index --branch main --commit-dirty=true

      - name: Commit generated lockfile to state branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          state_repo="$(mktemp -d)"
          cd "$state_repo"
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          if git fetch --depth=1 origin apt-index-state; then
            git checkout -B apt-index-state FETCH_HEAD
          else
            git checkout --orphan apt-index-state
            git rm -rf . >/dev/null 2>&1 || true
          fi
          cp "$GITHUB_WORKSPACE/apt-index.lock.json" ./apt-index.lock.json
          git add apt-index.lock.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Refresh apt index state"
          git push origin HEAD:apt-index-state

      - name: Purge changed package redirects
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: uv run apt-index purge-redirect-cache --urls redirect-purge-urls.txt
