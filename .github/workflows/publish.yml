name: Publish APT index

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

jobs:
  publish:
    if: ${{ github.event_name != 'push' || github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install zstd
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Refresh lockfile and health reports
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: uv run apt-index refresh --jobs 4

      - name: Commit generated lockfile
        run: |
          if ! git diff --quiet -- apt-index.lock.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add apt-index.lock.json
            git commit -m "Refresh apt index state"
            git push
          fi

      - name: Build deployable tree
        env:
          APT_INDEX_GPG_PRIVATE_KEY_B64: ${{ secrets.APT_INDEX_GPG_PRIVATE_KEY_B64 }}
          APT_INDEX_GPG_PASSPHRASE: ${{ secrets.APT_INDEX_GPG_PASSPHRASE }}
        run: uv run apt-index build

      - name: Plan redirect cache purge
        run: uv run apt-index plan-redirect-purge --output redirect-purge-urls.txt

      - name: Export download stats
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: uv run apt-index download-stats --output dist/download_stats.json

      - name: Publish to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist --project-name apt-index --branch main --commit-dirty=true

      - name: Purge changed package redirects
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: uv run apt-index purge-redirect-cache --urls redirect-purge-urls.txt
