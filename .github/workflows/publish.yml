name: Publish APT index

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install zstd
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Refresh lockfile and health reports
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: uv run apt-index refresh

      - name: Commit generated state
        run: |
          if ! git diff --quiet -- apt-index.lock.json track_health.json artifact_health.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add apt-index.lock.json track_health.json artifact_health.json
            git commit -m "Refresh apt index state"
            git push
          fi

      - name: Build deployable tree
        run: uv run apt-index build

      - name: Publish to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist --project-name apt-index --branch main --commit-dirty=true
